# =============================================================================
# FortiMonitor MCP Server - Simplified Docker Compose for End Users
# =============================================================================
#
# Quick Start:
#   1. Create a .env file with: FORTIMONITOR_API_KEY=your-api-key
#   2. Run: docker-compose -f docker-compose.share.yml up -d
#
# =============================================================================

services:
  unofficial-fortimonitor-mcp:
    image: ghcr.io/gjenkins20/unofficial-fortimonitor-mcp:latest
    container_name: unofficial-fortimonitor-mcp

    # Environment variables
    environment:
      # Required: Your FortiMonitor API Key
      - FORTIMONITOR_API_KEY=${FORTIMONITOR_API_KEY}

      # Optional: Customize these as needed
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_PERIOD=${RATE_LIMIT_PERIOD:-60}

      # Knowledge Layer (auto-ingests on first launch)
      - KNOWLEDGE_AUTO_INGEST=${KNOWLEDGE_AUTO_INGEST:-true}
      - KNOWLEDGE_BASE_PATH=/app/data/vectordb

    # Persist cache and knowledge base between restarts
    volumes:
      - fortimonitor-cache:/app/cache
      - fortimonitor-vectordb:/app/data/vectordb

    # Restart policy
    restart: unless-stopped

    # Resource limits (increased for Knowledge Layer)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

    # Security
    security_opt:
      - no-new-privileges:true

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "from src.config import get_settings; s = get_settings(); print('OK')"]
      interval: 60s
      timeout: 10s
      start_period: 10s
      retries: 3

    # Keep container alive for MCP server invocation
    stdin_open: true
    tty: false

# Named volumes
volumes:
  fortimonitor-cache:
    driver: local
  fortimonitor-vectordb:
    driver: local

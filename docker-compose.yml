# =============================================================================
# FortiMonitor MCP Server - Docker Compose Configuration
# =============================================================================
#
# Quick Start:
#   1. Copy .env.example to .env
#   2. Edit .env and set your FORTIMONITOR_API_KEY
#   3. Run: docker-compose up -d
#
# =============================================================================

services:
  fortimonitor-mcp:
    # Build from local Dockerfile or use pre-built image
    build:
      context: .
      dockerfile: Dockerfile
    # Alternatively, use published image:
    # image: your-dockerhub-username/fortimonitor-mcp:latest

    container_name: fortimonitor-mcp

    # Environment variables from .env file
    environment:
      # Required: FortiMonitor API Key
      - FORTIMONITOR_API_KEY=${FORTIMONITOR_API_KEY}

      # Optional: API Configuration
      - FORTIMONITOR_BASE_URL=${FORTIMONITOR_BASE_URL:-https://api2.panopta.com/v2}

      # Optional: MCP Server Configuration
      - MCP_SERVER_NAME=${MCP_SERVER_NAME:-fortimonitor-mcp}
      - MCP_SERVER_VERSION=${MCP_SERVER_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # Optional: Caching Configuration
      - ENABLE_SCHEMA_CACHE=${ENABLE_SCHEMA_CACHE:-true}
      - SCHEMA_CACHE_DIR=/app/cache/schemas
      - SCHEMA_CACHE_TTL=${SCHEMA_CACHE_TTL:-86400}

      # Optional: Rate Limiting
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_PERIOD=${RATE_LIMIT_PERIOD:-60}

    # Persist schema cache between restarts
    volumes:
      - fortimonitor-cache:/app/cache

    # Restart policy
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "from src.config import get_settings; get_settings()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Security options
    security_opt:
      - no-new-privileges:true

    # Read-only root filesystem (cache volume is writable)
    read_only: false

    # Standard input for MCP protocol
    stdin_open: true
    tty: false

# Named volumes
volumes:
  fortimonitor-cache:
    driver: local
